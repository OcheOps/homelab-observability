server:
  listen_addr: ":8090"
  read_timeout: 10s
  write_timeout: 10s

logging:
  level: "info"
  format: "json"

thresholds:
  bandwidth_bytes_per_sec: 104857600
  alert_count_before_action: 3

inventory:
  path: "/app/devices.yaml"

auth:
  username: ""
  password: ""
  # Set via env vars THROTTLE_AUTH_USER and THROTTLE_AUTH_PASS

prometheus:
  url: "http://localhost:9090"
